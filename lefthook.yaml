pre-commit:
  parallel: true
  commands:
    format:
      glob: '*.{js,jsx,ts,tsx}'
      run: pnpm format {staged_files}
      stage_fixed: true
      fail_text: 'Format failed. Run:pnpm format:check to fix.'

    lint:
      glob: '*.{js,jsx,ts,tsx}'
      run: pnpm lint {staged_files}
      fail_text: 'Lint failed. Run: pnpm lint:fix for details. Fix the code, not the config.'

    typecheck:
      glob: '*.{js,jsx,ts,tsx}'
      run: pnpm typecheck {staged_files}
      fail_text: 'Type check failed. Run: pnpm typecheck for details.'

pre-push:
  commands:
    typecheck:
      run: pnpm tsc --noEmit
      fail_text: 'Type check failed. Run: pnpm tsc --noEmit for details.'
